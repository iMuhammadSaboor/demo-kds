<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Counter — Demo KDS</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; background: var(--cream); overflow: hidden; }
  body { font-family: var(--body); }

  .pos {
    display: grid;
    grid-template-columns: 1fr 400px;
    height: 100vh;
    gap: 0;
  }

  /* ------- LEFT: menu grid ------- */
  .menu {
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--paper);
    border-right: 1px solid var(--line);
  }
  .menu__bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .menu__title {
    font-family: var(--display); font-weight: 700; font-size: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .menu__title::before {
    content: ""; width: 10px; height: 10px; border-radius: 50%;
    background: var(--crema);
  }
  .menu__cats {
    display: flex; gap: 6px; padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .cat-tab {
    font-family: var(--mono); font-size: 12px; text-transform: uppercase;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: transparent;
    color: var(--bean-2);
    white-space: nowrap;
    letter-spacing: .06em;
  }
  .cat-tab.is-on {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
    font-weight: 600;
  }

  .menu__grid {
    padding: 14px;
    overflow: auto;
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    align-content: start;
  }
  .item {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 12px;
    text-align: left;
    transition: transform .15s, border-color .15s, background .15s;
    display: flex; flex-direction: column; gap: 4px;
    min-height: 80px;
  }
  .item:hover { border-color: var(--crema); transform: translateY(-1px); }
  .item:active { background: var(--cream); }
  .item .name {
    font-family: var(--display); font-weight: 600; font-size: 15px;
  }
  .item .price { font-family: var(--mono); font-size: 13px; color: var(--crema-deep); font-weight: 500; }
  .item .station {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    letter-spacing: .08em; color: #8a7b6e; margin-top: auto;
  }

  /* ------- RIGHT: ticket ------- */
  .ticket {
    background: var(--ink);
    color: var(--paper);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .ticket__head {
    padding: 16px 18px;
    border-bottom: 1px solid #2a1a10;
    display: flex; justify-content: space-between; align-items: center;
  }
  .ticket__head h2 {
    font-family: var(--display); font-weight: 700; font-size: 16px;
    color: var(--crema);
    letter-spacing: .05em; text-transform: uppercase;
  }
  .ticket__head .count {
    font-family: var(--mono); font-size: 12px; color: #cbbda9;
  }

  .ticket__fields {
    padding: 14px 18px;
    display: grid; gap: 10px;
    border-bottom: 1px solid #2a1a10;
    background: #120a06;
  }
  .ticket__fields label {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .08em;
    text-transform: uppercase; color: #8a7b6e;
    display: block; margin-bottom: 4px;
  }
  .ticket__fields input, .ticket__fields select {
    width: 100%; background: #1a0f08; border: 1px solid #2a1a10;
    border-radius: 6px; padding: 9px 10px; color: var(--paper);
    font-family: var(--body); font-size: 14px;
  }
  .ticket__fields input:focus, .ticket__fields select:focus {
    outline: 2px solid var(--crema); outline-offset: 1px;
  }
  .ticket__fields .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .ticket__lines {
    flex: 1; overflow: auto;
    padding: 10px 18px;
  }
  .tline {
    display: grid; grid-template-columns: auto 1fr auto auto;
    align-items: start; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed #2a1a10;
  }
  .tline:last-child { border-bottom: 0; }
  .tline .qty {
    font-family: var(--mono); font-weight: 700; font-size: 15px;
    color: var(--crema);
    min-width: 24px;
  }
  .tline .nm { font-weight: 500; font-size: 14px; line-height: 1.35; }
  .tline .mods {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
  }
  .tline .mod {
    font-family: var(--mono); font-size: 10.5px;
    background: #2a1a10; padding: 2px 6px; border-radius: 4px;
    color: #cbbda9;
  }
  .tline .mod.is-on { background: var(--crema); color: #0f0b08; }
  .tline .price {
    font-family: var(--mono); font-size: 13px; color: var(--paper);
  }
  .tline .rm {
    color: #8a7b6e; font-size: 16px; padding: 0 4px;
  }
  .tline .rm:hover { color: var(--late); }

  .ticket__empty {
    display: grid; place-items: center; height: 100%;
    color: #8a7b6e; text-align: center;
    font-family: var(--body); font-size: 13.5px;
    padding: 40px 20px;
  }
  .ticket__empty .lg { font-size: 44px; margin-bottom: 10px; }

  .ticket__total {
    padding: 14px 18px;
    border-top: 1px solid #2a1a10;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--display); font-weight: 700; font-size: 20px;
    background: #120a06;
  }
  .ticket__total .lbl { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #8a7b6e; font-weight: 500; }

  .ticket__send {
    padding: 16px 18px;
    display: grid; gap: 8px;
    background: #120a06;
    border-top: 1px solid #2a1a10;
  }
  .ticket__send .send-btn {
    background: var(--crema); color: #0f0b08;
    font-family: var(--display); font-weight: 700; font-size: 16px;
    padding: 16px; border-radius: 8px;
    text-transform: uppercase; letter-spacing: .05em;
    box-shadow: 0 4px 0 rgba(166,115,63,.35);
    transition: transform .12s;
  }
  .ticket__send .send-btn:hover { transform: translateY(-1px); }
  .ticket__send .send-btn:disabled {
    background: #3a261a; color: #8a7b6e;
    box-shadow: none; cursor: not-allowed;
  }
  .ticket__send .secondary-row { display: flex; gap: 8px; }
  .ticket__send .secondary-row button {
    flex: 1;
    background: transparent; border: 1px solid #2a1a10;
    color: #cbbda9; padding: 9px 10px; border-radius: 6px;
    font-family: var(--mono); font-size: 11.5px;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .ticket__send .secondary-row button:hover { color: var(--paper); border-color: var(--crema); }

  /* ------- Mod popover ------- */
  .modsheet {
    position: fixed; inset: 0;
    background: rgba(10,6,4,.7);
    display: none;
    place-items: end;
    z-index: 100;
  }
  .modsheet.on { display: grid; }
  .modsheet__card {
    background: var(--paper);
    color: var(--ink);
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    border-radius: 16px 16px 0 0;
    padding: 22px;
    animation: slideUp .25s var(--ease);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
  .modsheet h3 { font-family: var(--display); font-size: 20px; margin-bottom: 4px; }
  .modsheet .sub { color: #8a7b6e; font-size: 13px; margin-bottom: 18px; }
  .modsheet__grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .modsheet__grid .m {
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--cream);
    font-size: 13.5px; font-weight: 500;
  }
  .modsheet__grid .m.is-on {
    background: var(--crema); color: var(--ink);
    border-color: var(--crema); font-weight: 700;
  }
  .modsheet__actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* ------- Flash confirmation ------- */
  .flash {
    position: fixed; left: 50%; top: 30%;
    transform: translateX(-50%) scale(.9);
    background: var(--crema); color: var(--ink);
    padding: 22px 32px; border-radius: 14px;
    font-family: var(--display); font-weight: 700; font-size: 28px;
    opacity: 0; transition: all .25s var(--ease);
    pointer-events: none; z-index: 200;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,.3);
  }
  .flash.on { opacity: 1; transform: translateX(-50%) scale(1); }
  .flash small { display: block; font-family: var(--mono); font-size: 13px; margin-top: 6px; opacity: .75; font-weight: 500; }

  @media (max-width: 860px) {
    .pos { grid-template-columns: 1fr; grid-template-rows: 1fr 45vh; }
    .ticket { border-top: 2px solid var(--crema); }
  }
</style>
</head>
<body>

<div class="pos">
  <!-- LEFT: menu -->
  <section class="menu">
    <div class="menu__bar">
      <div class="menu__title">Counter · Demo KDS</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <a href="/" class="btn btn--ghost" style="padding:6px 10px;font-size:12px;">← Home</a>
        <a href="/kds.html" class="btn btn--ghost" style="padding:6px 10px;font-size:12px;" target="_blank">Open KDS →</a>
      </div>
    </div>
    <nav class="menu__cats" id="cats"></nav>
    <div class="menu__grid" id="items"></div>
  </section>

  <!-- RIGHT: ticket -->
  <aside class="ticket">
    <div class="ticket__head">
      <h2>Ticket</h2>
      <span class="count" id="tcount">0 items</span>
    </div>

    <div class="ticket__fields">
      <div class="row">
        <div>
          <label>Customer name</label>
          <input id="cust" placeholder="e.g. Emma" autocomplete="off" />
        </div>
        <div>
          <label>Channel</label>
          <select id="chan">
            <option value="counter">Counter (walk-in)</option>
            <option value="phone">Phone</option>
            <option value="online">Online</option>
          </select>
        </div>
      </div>
      <div>
        <label>Note for kitchen (optional)</label>
        <input id="note" placeholder="e.g. nuts allergy" autocomplete="off" />
      </div>
    </div>

    <div class="ticket__lines" id="lines">
      <div class="ticket__empty">
        <div class="lg">☕</div>
        Tap items on the left to build the ticket.
      </div>
    </div>

    <div class="ticket__total">
      <span class="lbl">Total</span>
      <span id="total">$0.00</span>
    </div>

    <div class="ticket__send">
      <button class="send-btn" id="send" disabled>Send to Kitchen</button>
      <div class="secondary-row">
        <button id="clear">Clear</button>
        <button id="demo">+Demo order</button>
      </div>
    </div>
  </aside>
</div>

<!-- Mod selector sheet -->
<div class="modsheet" id="modsheet" role="dialog" aria-modal="true">
  <div class="modsheet__card">
    <h3 id="mod-title">Item</h3>
    <div class="sub" id="mod-sub">Optional modifications — tap to toggle</div>
    <div class="modsheet__grid" id="mod-grid"></div>
    <div class="modsheet__actions">
      <button class="btn btn--ghost" id="mod-cancel">Skip</button>
      <button class="btn btn--primary" id="mod-confirm">Add to ticket</button>
    </div>
  </div>
</div>

<div class="flash" id="flash">Order sent!<small>to the kitchen display</small></div>

<!-- Mode indicator -->
<div id="mode-pill" style="position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:80;display:none;font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:999px;background:rgba(232,71,44,.9);color:#fff;">
  Backend offline — using local mode
</div>

<script src="client-api.js"></script>
<script>
/* ======================================================
   COUNTER — builds tickets, fires orders to the KDS
   Talks to /api/orders via kdsApi wrapper (client-api.js).
   Falls back to localStorage if backend is unreachable.
   ====================================================== */

const state = {
  menu: null,
  currentCat: null,
  ticket: [], // {itemId, name, price, station, mods: [], prepMin, qty}
  pendingItem: null,
};

/* Fetch menu */
fetch("./menu.json")
  .then(r => r.json())
  .then(data => { state.menu = data; renderCats(); })
  .catch(err => console.error("Menu load failed:", err));

function renderCats() {
  const cats = document.getElementById("cats");
  cats.innerHTML = state.menu.categories.map((c, i) => `
    <button class="cat-tab ${i === 0 ? "is-on" : ""}" data-cat="${c.id}">${c.name}</button>
  `).join("");
  state.currentCat = state.menu.categories[0].id;
  cats.querySelectorAll(".cat-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      cats.querySelectorAll(".cat-tab").forEach(b => b.classList.remove("is-on"));
      btn.classList.add("is-on");
      state.currentCat = btn.getAttribute("data-cat");
      renderItems();
    });
  });
  renderItems();
}

function renderItems() {
  const cat = state.menu.categories.find(c => c.id === state.currentCat);
  const items = document.getElementById("items");
  items.innerHTML = cat.items.map(it => `
    <button class="item" data-id="${it.id}">
      <span class="name">${it.name}</span>
      <span class="price">$${it.price.toFixed(2)}</span>
      <span class="station">${cat.station} · ${it.prepMin}min</span>
    </button>
  `).join("");
  items.querySelectorAll(".item").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-id");
      const item = cat.items.find(i => i.id === id);
      pickItem({ ...item, station: cat.station });
    });
  });
}

function pickItem(item) {
  if (item.mods && item.mods.length) {
    state.pendingItem = { ...item, mods: item.mods, picked: [] };
    openMods();
  } else {
    addToTicket({ ...item, mods: [] });
  }
}

/* Mod sheet */
function openMods() {
  const sh = document.getElementById("modsheet");
  document.getElementById("mod-title").textContent = state.pendingItem.name;
  document.getElementById("mod-sub").textContent = `$${state.pendingItem.price.toFixed(2)} · ${state.pendingItem.station}`;
  const grid = document.getElementById("mod-grid");
  grid.innerHTML = state.pendingItem.mods.map(m => `
    <button class="m" data-m="${m}">${m}</button>
  `).join("");
  grid.querySelectorAll(".m").forEach(btn => {
    btn.addEventListener("click", () => btn.classList.toggle("is-on"));
  });
  sh.classList.add("on");
}
document.getElementById("mod-cancel").addEventListener("click", () => {
  addToTicket({ ...state.pendingItem, mods: [] });
  closeMods();
});
document.getElementById("mod-confirm").addEventListener("click", () => {
  const picked = Array.from(document.querySelectorAll("#mod-grid .m.is-on")).map(b => b.getAttribute("data-m"));
  addToTicket({ ...state.pendingItem, mods: picked });
  closeMods();
});
function closeMods() {
  document.getElementById("modsheet").classList.remove("on");
  state.pendingItem = null;
}

/* Ticket */
function addToTicket(it) {
  // Merge only if identical name+mods, else new line (so different mod sets stay separate)
  const sig = it.name + "::" + (it.mods || []).slice().sort().join("+");
  const match = state.ticket.find(t => t.sig === sig);
  if (match) match.qty += 1;
  else state.ticket.push({ ...it, qty: 1, sig });
  renderTicket();
}

function removeLine(idx) {
  state.ticket.splice(idx, 1);
  renderTicket();
}

function renderTicket() {
  const wrap = document.getElementById("lines");
  const count = state.ticket.reduce((a,b) => a + b.qty, 0);
  document.getElementById("tcount").textContent = count + " item" + (count === 1 ? "" : "s");

  if (!state.ticket.length) {
    wrap.innerHTML = `<div class="ticket__empty"><div class="lg">☕</div>Tap items on the left to build the ticket.</div>`;
    document.getElementById("total").textContent = "$0.00";
    document.getElementById("send").disabled = true;
    return;
  }

  wrap.innerHTML = state.ticket.map((t, i) => `
    <div class="tline">
      <span class="qty">${t.qty}×</span>
      <div>
        <div class="nm">${t.name}</div>
        ${t.mods.length ? `<div class="mods">${t.mods.map(m => `<span class="mod is-on">${m}</span>`).join("")}</div>` : ""}
      </div>
      <span class="price">$${(t.price * t.qty).toFixed(2)}</span>
      <button class="rm" onclick="removeLine(${i})" aria-label="Remove">×</button>
    </div>`).join("");
  const total = state.ticket.reduce((a,b) => a + b.price * b.qty, 0);
  document.getElementById("total").textContent = "$" + total.toFixed(2);
  document.getElementById("send").disabled = false;
}
window.removeLine = removeLine;

/* Send to KDS */
document.getElementById("send").addEventListener("click", send);
document.getElementById("clear").addEventListener("click", () => { state.ticket = []; renderTicket(); });
document.getElementById("demo").addEventListener("click", demoFill);

async function send() {
  if (!state.ticket.length) return;
  const btn = document.getElementById("send");
  btn.disabled = true;
  btn.textContent = "Sending…";

  const payload = {
    channel: document.getElementById("chan").value,
    customer: document.getElementById("cust").value.trim() || "Walk-in",
    note: document.getElementById("note").value.trim(),
    items: state.ticket.map(t => ({
      qty: t.qty, name: t.name, station: t.station,
      mods: t.mods, prepMin: t.prepMin || 3,
      priceEach: t.price,
    })),
  };

  const order = await kdsApi.createOrder(payload);

  // Flash confirmation
  const flash = document.getElementById("flash");
  flash.innerHTML = `Order ${order.num} fired!<small>${state.ticket.length} line${state.ticket.length === 1 ? "" : "s"} → kitchen</small>`;
  flash.classList.add("on");
  setTimeout(() => flash.classList.remove("on"), 1400);

  // Reset
  state.ticket = [];
  document.getElementById("cust").value = "";
  document.getElementById("note").value = "";
  renderTicket();
  btn.textContent = "Send to Kitchen";
}

/* mode pill — shows if backend unreachable */
window.addEventListener("kdsapi:mode", () => {
  const pill = document.getElementById("mode-pill");
  if (!pill) return;
  pill.style.display = kdsApi.mode === "local" ? "block" : "none";
});

function demoFill() {
  if (!state.menu) return;
  const bar = state.menu.categories.find(c => c.id === "coffee").items;
  const kit = state.menu.categories.find(c => c.id === "brunch").items;
  const names = ["Emma", "Luca", "Priya", "Jake", "Hana", "Tom", "Maya", "Ben"];
  document.getElementById("cust").value = names[Math.floor(Math.random() * names.length)];
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  addToTicket({ ...pick(bar), station: "bar", mods: Math.random() > .5 ? ["oat"] : [] });
  if (Math.random() > .4) addToTicket({ ...pick(kit), station: "kitchen", mods: [] });
  if (Math.random() > .6) addToTicket({ ...pick(bar), station: "bar", mods: [] });
}
</script>
</body>
</html>
